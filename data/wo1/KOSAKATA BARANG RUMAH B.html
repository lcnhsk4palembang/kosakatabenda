            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background: var(--primary);
            color: white;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
        header p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.8; }

        .tab-container {
            display: flex;
            overflow-x: auto;
            width: 100%;
            background: white;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            flex: 1;
            padding: 15px 20px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            font-weight: bold;
            color: #7f8c8d;
            transition: 0.3s;
        }
        .tab.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }

        .content {
            width: 90%;
            max-width: 450px;
            margin-top: 30px;
            text-align: center;
        }

        .progress { margin-bottom: 10px; font-size: 0.9rem; color: #666; }

        .card-container {
            perspective: 1000px;
            height: 320px;
            cursor: pointer;
            margin-bottom: 25px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: var(--white);
            padding: 30px;
            box-sizing: border-box;
        }
        .card-back { transform: rotateY(180deg); background: #fffcf5; }

        .hanzi { font-size: 60px; font-family: "SimSun", serif; font-weight: bold; color: var(--primary); margin: 0; }
        .pinyin { font-size: 24px; color: var(--accent); margin: 15px 0; }
        .meaning { font-size: 20px; color: #34495e; font-weight: 500; }
        .hint { font-size: 11px; color: #bbb; margin-top: 30px; text-transform: uppercase; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.98); }
        .shuffle-btn { grid-column: span 2; background: #27ae60; }
        
        .empty-state { padding: 50px; color: #95a5a6; font-style: italic; }
    </style>
</head>

    let currentRoom = 'ruang_tamu';

    let currentSet = [...allData[currentRoom]];

    function switchTab(room, element) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        currentRoom = room;
        currentSet = [...allData[currentRoom]];
        currentIndex = 0;
        if (currentSet.length > 0) {
            document.getElementById('flashcard-area').style.display = 'block';
            document.getElementById('empty-msg').style.display = 'none';
            updateCard();
        } else {
            document.getElementById('flashcard-area').style.display = 'none';
            document.getElementById('empty-msg').style.display = 'block';
        }
    }

    function updateCard() {
        const cardBox = document.getElementById('cardBox');
        cardBox.classList.remove('flipped');
        setTimeout(() => {
            const item = currentSet[currentIndex];
            document.getElementById('frontHanzi').innerText = item.h;
            document.getElementById('backPinyin').innerText = item.p;
            document.getElementById('backMeaning').innerText = item.m;
            document.getElementById('progressText').innerText = `Kartu ${currentIndex + 1} dari ${currentSet.length}`;
        }, 150);
    }

    function nextCard() {
        if (currentSet.length === 0) return;
        currentIndex = (currentIndex + 1) % currentSet.length;
        updateCard();
    }

    function prevCard() {
        if (currentSet.length === 0) return;
        currentIndex = (currentIndex - 1 + currentSet.length) % currentSet.length;
        updateCard();
    }

    function shuffleCards() {
        if (currentSet.length === 0) return;
        currentSet.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        updateCard();
    }

    updateCard();
</script>
